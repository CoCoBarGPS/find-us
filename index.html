        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2-lat1) * Math.PI / 180;
            const dLon = (lon2-lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function findNearest() {
            if (!navigator.geolocation) {
                document.getElementById('status').innerText = "您的瀏覽器不支持定位";
                return;
            }

            navigator.geolocation.getCurrentPosition(position => {
                const userLat = position.coords.latitude;
                const userLng = position.coords.longitude;

                let nearest = stores.reduce((prev, curr) => {
                    let distPrev = getDistance(userLat, userLng, prev.lat, prev.lng);
                    let distCurr = getDistance(userLat, userLng, curr.lat, curr.lng);
                    return (distCurr < distPrev) ? curr : prev;
                });

                document.getElementById('status').innerText = "已找到最近據點：" + nearest.name;
                
                // 跳轉至 Google Maps 導航連結
                setTimeout(() => {
                    window.location.href = `https://google.com{nearest.lat},${nearest.lng}`;
                }, 800);

            }, (error) => {
                document.getElementById('status').innerText = "定位授權失敗";
                document.getElementById('info').innerText = "請確保已開啟 GPS 並允許瀏覽器存取位置。";
            }, { enableHighAccuracy: true });
        }

        window.onload = findNearest;
    </script>
