    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; 
        const dLat = (lat2-lat1) * Math.PI / 180;
        const dLon = (lon2-lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function findNearestStores() {
        const btn = document.getElementById('locateBtn');
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');
        const listDiv = document.getElementById('storeList');

        btn.style.display = 'none';
        loader.style.display = 'block';
        status.innerText = "正在精算距離...";
        listDiv.innerHTML = "";

        navigator.geolocation.getCurrentPosition(position => {
            const uLat = position.coords.latitude;
            const uLng = position.coords.longitude;

            // 計算所有店家的距離並排序
            let results = stores.map(s => {
                return { ...s, distance: getDistance(uLat, uLng, s.lat, s.lng) };
            }).sort((a, b) => a.distance - b.distance).slice(0, 10); // 取前 10 名

            loader.style.display = 'none';
            status.innerText = "已為您找到最近的 10 個據點：";

            results.forEach(s => {
                const item = document.createElement('div');
                item.className = 'store-item';
                const distText = s.distance < 1 ? (s.distance * 1000).toFixed(0) + " 公尺" : s.distance.toFixed(1) + " 公里";
                
                item.innerHTML = `
                    <div class="store-info">
                        <div class="store-name">${s.name} <span class="store-dist">(${distText})</span></div>
                        <div class="store-addr">${s.addr}</div>
                    </div>
                    <a class="btn-nav" href="https://google.com{s.lat},${s.lng}" target="_blank">導航</a>
                `;
                listDiv.appendChild(item);
            });

        }, (error) => {
            loader.style.display = 'none';
            btn.style.display = 'block';
            status.innerText = "定位失敗，請確保已開啟 GPS 權限。";
        }, { enableHighAccuracy: true });
    }
